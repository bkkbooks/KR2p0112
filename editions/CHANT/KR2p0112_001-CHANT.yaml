body:
  text: 散見簡牘合輯甘肅甘谷漢簡延熹元年十二月壬申朔十二日甲申宗正臣柜丞臣敬頓首死罪上尚書臣柜頓首死罪死罪謹案文書永壽三年三月十六日蜀郡大守稙書言乙酉示章詔書宗室第一審諸侯五屬內居國界有罪請五屬外便以法令治流客雖五屬內不得行復除宗室劉槐劉直自訟為鄉縣所侵不行復除稙到官勸耕桑槐直等駱驛愬訟當如永和六年庚午詔書第二以補正劉奉客霸陵不欲為吏召蜀劉饒遂爵召明給事又鄉掾長萌等令又出廿錢及吏張第三客流雖融堪等辤并都書言融堪務應復升等調融成都宗室劉羽劉震各復詣方言郡被書不奉行競毆辱責更算道橋錢役使不得安土業止於民臨邛論劉震劉羽請方融辤移益州實核今刺史遷書言永壽二第五劉憲等七人補吏服决謁以狀自言鄉佐羅升楊盖楊純馬石李植等算錢賦捕掾陽犨劉岑岑從月屬屬盡侯更算水薄及門錢亭長池廉第六楊易口劉生等從閉獄令出錢縑絹錄鞭搒託小第七盡皆勿事永和年八月怠苦齊同辛亥詔書勿收責收責宗室士錢令齊同其年九月廿八日司徒壽大司農廣上詔書從民家貸錢臧官有警運給軍糧宗室依發士不出貸錢其月辛亥詔書報可又永和六年二月一日故宗正宣上北第九廣陵令解登鉅鹿𨝫守長張建廣宗長福登令曹掾許敦門下吏彤石游儌龍進兵馬徐沙福亭長樊赦令宗室劉江劉俞劉樹劉舉等著赤幘為伍長守街治滯第十農上郡令浦沙縛江等民間夕給吏承度詐自復州澆遭謙等甫親擊獄搒笞劉自第十一職每有稱患恐債代巧餘非又國答塞略皆如辭建武七年十月二釋宗室不以理司州牧舉宗室有屬盡勵無所第十二有詔書宗室屬盡當復𤅊廷錄部從事史勳傳所侯大守訪楗為大守宣各書乙酉宗室與審諸侯居國界有有州水持節長酉書劉萇召劉直甫頓各有書第十四州郡奉行或悉承章賦更事橫加僇辱有罪不請比被方却稽復謁移列令小民懷怨遠愬紛紛連年非聖朝崇弘小意悉惑不曉施行繆錯令上恩偏鬲又張掖觻得劉都京兆長第十五忠柿也郡縣詔書違言者辤利有廢入書煩苛之為遣第十六雖不知之義寧得侯王一之苛奪宗室遂忸玉敢之聽獄世書哀閔示郡論郡以明長詔侯第十七等令酉為曹華史許秉上請鞌錢其吏責第十八詔書宗室有屬屬盡皆勿事戶令犯者行罪罰勿令為吏書勑詔書發郡縣士或收宗室屬盡錢或不明復除相指聽章有十月廿日丙子涼州刺史超使告部漢陽從史忠等移郡國大守都尉寫移書到檢案奉行右言被書後五日如宗正府書律令第廿鞌尉吏如為文無舊典第廿一延熹二年四月庚午朔十二日辛巳涼州刺史陟使下郡國大守都尉承書從事下當用者如詔書各實核誰為州集七尹書到言第廿二延熹元年四月庚午朔十二日壬午漢陽大守濟長史億下冀中西部督郵掾術亮史叙屬縣令長承書從事下當用者如詔書各實所部正處書到言如詔書律令第廿三
